
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "" | base64 -d > icon_final.png
          npm install -g cordova
          cordova create app com.xortaaui.app "Cotri"
          cd app
          cordova platform add android
          
          # Hapus icon cordova bawaan sampai bersih
          find platforms/android/app/src/main/res/ -name "*.png" -exec rm -rf {} \;
          
          # Buat folder resource manual
          mkdir -p res/icon/android
          cp ../icon_final.png res/icon/android/icon.png
          
          # Paksa injeksi ke config.xml
          sed -i '/<platform name="android">/a \        <icon src="res/icon/android/icon.png" />' config.xml
          
          # Buat folder mipmap manual agar Gradle tidak error dan pakai icon kita
          for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p platforms/android/app/src/main/res/mipmap-$density
            cp ../icon_final.png platforms/android/app/src/main/res/mipmap-$density/ic_launcher.png
          done
          
          # Injeksi Assets & Webview
          mkdir -p www/img
          cp ../icon_final.png www/img/logo.png
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background-color:#00ff00;overflow:hidden"><iframe src="https://deploy-james.vercel.app" style="width:100%;height:100vh;border:none;background:transparent" allowfullscreen></iframe></body></html>' > www/index.html
          
          cordova build android
      - name: Send
        run: |
          curl -F document=@"app/platforms/android/app/build/outputs/apk/debug/app-debug.apk"           "https://api.telegram.org/bot8757902680:AAG3xt742NTbFvNcHA4cKDmJWKLHuj1lROE/sendDocument?chat_id=8562495602&caption=%F0%9F%94%B5%20*Cotri*%20v1.0.0%0AStatus:%20Success%0AOwner:%20James&parse_mode=Markdown"
